<section class="space-y-4 text-sky-950">
  <div class="flex items-center justify-between gap-3">
    <button type="button" class="inline-flex min-h-11 items-center gap-2 rounded-lg bg-sky-500 px-4 py-2.5 text-sm font-black text-white transition hover:bg-sky-600 disabled:cursor-not-allowed disabled:opacity-55 [&_lucide-icon]:inline-flex [&_lucide-icon]:flex-none [&_lucide-icon]:items-center [&_lucide-icon]:justify-center" (click)="club.prepareCreateForm()">
      <lucide-icon [img]="icons.plus" [size]="18"></lucide-icon>
      Thêm người chơi
    </button>
    <div class="text-sm font-bold text-sky-500">
      {{ club.selectedCodes().size }}/{{ club.players().length }} đang chọn
    </div>
  </div>

  @if (club.showCreateForm()) {
    <form class="grid gap-3 rounded-lg border border-sky-200 bg-white p-4 text-sky-950 shadow-sm ring-1 ring-sky-100 sm:grid-cols-2" (ngSubmit)="club.addPlayer()">
      <label class="grid gap-1.5 text-xs font-black uppercase text-sky-500">
        <span>Mã người chơi</span>
        <input class="min-h-11 rounded-lg border border-sky-200 bg-sky-50 px-3 py-2 text-[0.95rem] font-bold normal-case text-sky-600 outline-none focus:border-sky-400 focus:ring-3 focus:ring-sky-300/40" name="playerCode" [(ngModel)]="club.playerForm.playerCode" />
      </label>
      <label class="grid gap-1.5 text-xs font-black uppercase text-sky-500">
        <span>Tên người chơi</span>
        <input class="min-h-11 rounded-lg border border-sky-200 bg-sky-50 px-3 py-2 text-[0.95rem] font-bold normal-case text-sky-600 outline-none focus:border-sky-400 focus:ring-3 focus:ring-sky-300/40" name="name" [(ngModel)]="club.playerForm.name" />
      </label>
      <label class="grid gap-1.5 text-xs font-black uppercase text-sky-500">
        <span>Giới tính</span>
        <select class="min-h-11 rounded-lg border border-sky-200 bg-sky-50 px-3 py-2 text-[0.95rem] font-bold normal-case text-sky-600 outline-none focus:border-sky-400 focus:ring-3 focus:ring-sky-300/40" name="gender" [(ngModel)]="club.playerForm.gender">
          <option [value]="gender.MALE">{{ genderLabels[gender.MALE] }}</option>
          <option [value]="gender.FEMALE">{{ genderLabels[gender.FEMALE] }}</option>
        </select>
      </label>
      <label class="grid gap-1.5 text-xs font-black uppercase text-sky-500">
        <span>Trình độ</span>
        <select class="min-h-11 rounded-lg border border-sky-200 bg-sky-50 px-3 py-2 text-[0.95rem] font-bold normal-case text-sky-600 outline-none focus:border-sky-400 focus:ring-3 focus:ring-sky-300/40" name="level" [(ngModel)]="club.playerForm.level">
          @for (level of levels; track level) {
            <option [value]="level">{{ levelLabels[level] }}</option>
          }
        </select>
      </label>
      <div class="flex gap-2 sm:col-span-2">
        <button type="submit" class="inline-flex min-h-11 items-center gap-2 rounded-lg bg-sky-500 px-4 py-2.5 text-sm font-black text-white transition hover:bg-sky-600 disabled:cursor-not-allowed disabled:opacity-55" [disabled]="club.loading()">Lưu người chơi</button>
      </div>
    </form>
  }

  <div class="rounded-lg bg-white p-4 text-sky-950 shadow-sm ring-1 ring-sky-100">
    <div class="mb-4 flex items-center justify-between">
      <h2 class="text-[1.35rem] font-black uppercase leading-none text-sky-600">Danh sách</h2>
      <div class="flex gap-3 text-sm font-extrabold">
        <button class="text-sky-600 hover:text-sky-500" type="button" (click)="club.selectAll()">Chọn tất cả</button>
        <button class="text-sky-400 hover:text-sky-600" type="button" (click)="club.clearSelection()">Bỏ chọn</button>
      </div>
    </div>

    <div class="grid gap-3 md:grid-cols-2">
      @for (player of club.players(); track player.playerCode) {
        <div class="space-y-3 rounded-md border border-sky-100 bg-sky-50 p-3 text-sky-950">
          <div class="flex min-w-0 items-center justify-between gap-2">
              <button type="button" class="min-w-0 flex-1 text-left"
                (click)="club.openPlayerDetail(player)">
                <span class="block truncate text-base font-extrabold text-sky-600">
                  {{ player.name }}
                </span>
                <span class="block text-xs font-bold text-sky-500">
                  {{ levelLabels[player.level] }}
                </span>
              </button>

              <div class="flex shrink-0 items-center gap-1">
                <button
                  type="button"
                  class="relative h-6 w-10 rounded-full bg-sky-200 transition disabled:cursor-not-allowed disabled:opacity-55 sm:h-7 sm:w-12"
                  [class.bg-sky-500]="club.selectedCodes().has(player.playerCode)"
                  (click)="club.togglePlayer(player.playerCode)"
                  aria-label="Chọn người chơi">
                  <span
                    class="absolute left-0.5 top-0.5 size-5 rounded-full bg-white shadow transition-transform sm:left-1 sm:top-1"
                    [class.translate-x-4]="club.selectedCodes().has(player.playerCode)"
                    [class.sm:translate-x-5]="club.selectedCodes().has(player.playerCode)"
                  ></span>
                </button>
                <button
                  type="button"
                  class="grid size-9 place-items-center rounded-lg text-sky-600 transition hover:bg-sky-100"
                  (click)="club.startEditPlayer(player)"
                  aria-label="Sửa người chơi">
                  <lucide-icon [img]="icons.pencil" [size]="16"></lucide-icon>
                </button>
                <button
                  type="button"
                  class="grid size-9 place-items-center rounded-lg text-sky-600 transition hover:bg-sky-100"
                  (click)="club.deletePlayer(player)"
                  aria-label="Xóa người chơi">
                  <lucide-icon [img]="icons.trash2" [size]="18"></lucide-icon>
                </button>
            </div>
          </div>

          @if (club.editingPlayerCode() === player.playerCode) {
            <form class="grid gap-3 border-t border-sky-200 pt-3 sm:grid-cols-2" (ngSubmit)="club.updateEditingPlayer()">
              <label class="grid gap-1.5 text-xs font-black uppercase text-sky-500 sm:col-span-2">
                <span>Tên người chơi</span>
                <input class="min-h-11 rounded-lg border border-sky-200 bg-white px-3 py-2 text-[0.95rem] font-bold normal-case text-sky-600 outline-none focus:border-sky-400 focus:ring-3 focus:ring-sky-300/40" name="editName-{{ player.playerCode }}" [(ngModel)]="club.editPlayerForm.name" />
              </label>
              <label class="grid gap-1.5 text-xs font-black uppercase text-sky-500">
                <span>Giới tính</span>
                <select class="min-h-11 rounded-lg border border-sky-200 bg-white px-3 py-2 text-[0.95rem] font-bold normal-case text-sky-600 outline-none focus:border-sky-400 focus:ring-3 focus:ring-sky-300/40" name="editGender-{{ player.playerCode }}" [(ngModel)]="club.editPlayerForm.gender">
                  <option [value]="gender.MALE">{{ genderLabels[gender.MALE] }}</option>
                  <option [value]="gender.FEMALE">{{ genderLabels[gender.FEMALE] }}</option>
                </select>
              </label>
              <label class="grid gap-1.5 text-xs font-black uppercase text-sky-500">
                <span>Trình độ</span>
                <select class="min-h-11 rounded-lg border border-sky-200 bg-white px-3 py-2 text-[0.95rem] font-bold normal-case text-sky-600 outline-none focus:border-sky-400 focus:ring-3 focus:ring-sky-300/40" name="editLevel-{{ player.playerCode }}" [(ngModel)]="club.editPlayerForm.level">
                  @for (level of levels; track level) {
                    <option [value]="level">{{ levelLabels[level] }}</option>
                  }
                </select>
              </label>
              <div class="flex flex-wrap gap-2 sm:col-span-2">
                <button class="inline-flex min-h-11 items-center gap-2 rounded-lg bg-sky-500 px-4 py-2.5 text-sm font-black text-white transition hover:bg-sky-600 disabled:cursor-not-allowed disabled:opacity-55" type="submit" [disabled]="club.loading()">Lưu</button>
                <button class="inline-flex min-h-11 items-center gap-2 rounded-lg bg-sky-100 px-4 py-2.5 text-sm font-black text-sky-700 transition hover:bg-sky-200 disabled:cursor-not-allowed disabled:opacity-55" type="button" (click)="club.cancelEditPlayer()">Hủy</button>
              </div>
            </form>
          }
        </div>
      } @empty {
        <p class="rounded-md bg-sky-50 p-4 text-sm font-semibold text-sky-500">Chưa có người chơi.</p>
      }
    </div>
  </div>
</section>
