<section class="space-y-4 text-pink-950">
  <div class="flex items-center justify-between gap-3">
    <button type="button" class="inline-flex min-h-11 items-center gap-2 rounded-lg bg-pink-500 px-4 py-2.5 text-sm font-black text-white transition hover:bg-pink-600 disabled:cursor-not-allowed disabled:opacity-55 [&_lucide-icon]:inline-flex [&_lucide-icon]:flex-none [&_lucide-icon]:items-center [&_lucide-icon]:justify-center" (click)="club.prepareCreateForm()">
      <lucide-icon [img]="icons.plus" [size]="18"></lucide-icon>
      Thêm người chơi
    </button>
    <div class="text-sm font-bold text-pink-500">
      {{ club.selectedCodes().size }}/{{ club.players().length }} đang chọn
    </div>
  </div>

  @if (club.showCreateForm()) {
    <form class="grid gap-3 rounded-lg border border-pink-200 bg-white p-4 text-pink-950 shadow-sm ring-1 ring-pink-100 sm:grid-cols-2" (ngSubmit)="club.addPlayer()">
      <label class="grid gap-1.5 text-xs font-black uppercase text-pink-500">
        <span>Mã người chơi</span>
        <input class="min-h-11 rounded-lg border border-pink-200 bg-pink-50 px-3 py-2 text-[0.95rem] font-bold normal-case text-pink-950 outline-none focus:border-pink-400 focus:ring-3 focus:ring-pink-300/40" name="playerCode" [(ngModel)]="club.playerForm.playerCode" />
      </label>
      <label class="grid gap-1.5 text-xs font-black uppercase text-pink-500">
        <span>Tên người chơi</span>
        <input class="min-h-11 rounded-lg border border-pink-200 bg-pink-50 px-3 py-2 text-[0.95rem] font-bold normal-case text-pink-950 outline-none focus:border-pink-400 focus:ring-3 focus:ring-pink-300/40" name="name" [(ngModel)]="club.playerForm.name" />
      </label>
      <label class="grid gap-1.5 text-xs font-black uppercase text-pink-500">
        <span>Giới tính</span>
        <select class="min-h-11 rounded-lg border border-pink-200 bg-pink-50 px-3 py-2 text-[0.95rem] font-bold normal-case text-pink-950 outline-none focus:border-pink-400 focus:ring-3 focus:ring-pink-300/40" name="gender" [(ngModel)]="club.playerForm.gender">
          <option [value]="gender.MALE">{{ genderLabels[gender.MALE] }}</option>
          <option [value]="gender.FEMALE">{{ genderLabels[gender.FEMALE] }}</option>
        </select>
      </label>
      <label class="grid gap-1.5 text-xs font-black uppercase text-pink-500">
        <span>Trình độ</span>
        <select class="min-h-11 rounded-lg border border-pink-200 bg-pink-50 px-3 py-2 text-[0.95rem] font-bold normal-case text-pink-950 outline-none focus:border-pink-400 focus:ring-3 focus:ring-pink-300/40" name="level" [(ngModel)]="club.playerForm.level">
          @for (level of levels; track level) {
            <option [value]="level">{{ levelLabels[level] }}</option>
          }
        </select>
      </label>
      <div class="flex gap-2 sm:col-span-2">
        <button type="submit" class="inline-flex min-h-11 items-center gap-2 rounded-lg bg-pink-500 px-4 py-2.5 text-sm font-black text-white transition hover:bg-pink-600 disabled:cursor-not-allowed disabled:opacity-55" [disabled]="club.loading()">Lưu người chơi</button>
      </div>
    </form>
  }

  <div class="rounded-lg bg-white p-4 text-pink-950 shadow-sm ring-1 ring-pink-100">
    <div class="mb-4 flex items-center justify-between">
      <h2 class="text-[1.35rem] font-black uppercase leading-none text-pink-600">Danh sách</h2>
      <div class="flex gap-3 text-sm font-extrabold">
        <button class="text-pink-600 hover:text-pink-500" type="button" (click)="club.selectAll()">Chọn hết</button>
        <button class="text-pink-400 hover:text-pink-600" type="button" (click)="club.clearSelection()">Bỏ hết</button>
      </div>
    </div>

    <div class="grid gap-3 md:grid-cols-2">
      @for (player of club.players(); track player.playerCode) {
        <div class="space-y-3 rounded-md border border-pink-100 bg-pink-50 p-3 text-pink-950">
          <div class="flex min-h-12 items-center gap-3">
            <button class="min-w-0 flex-1 text-left" type="button" (click)="club.openPlayerDetail(player)">
              <span class="block truncate text-base font-extrabold text-pink-950">{{ player.name }}</span>
              <span class="text-xs font-bold text-pink-500">{{ levelLabels[player.level] }}</span>
            </button>
            <button
              type="button"
              class="relative h-7 w-12 flex-none rounded-full bg-pink-200 transition disabled:cursor-not-allowed disabled:opacity-55"
              [class.bg-pink-500]="club.selectedCodes().has(player.playerCode)"
              (click)="club.togglePlayer(player.playerCode)"
              aria-label="Chọn người chơi"
            >
              <span class="absolute left-1 top-1 size-5 rounded-full bg-white shadow transition-transform" [class.translate-x-5]="club.selectedCodes().has(player.playerCode)"></span>
            </button>
            <button class="inline-flex min-h-[2.35rem] items-center rounded-lg px-2.5 text-[0.82rem] font-black text-pink-600 hover:bg-pink-100 [&_lucide-icon]:inline-flex [&_lucide-icon]:flex-none [&_lucide-icon]:items-center [&_lucide-icon]:justify-center" type="button" (click)="club.startEditPlayer(player)" aria-label="Sửa người chơi">
              <lucide-icon [img]="icons.pencil" [size]="16"></lucide-icon>
            </button>
            <button class="grid size-[2.35rem] place-items-center rounded-lg text-pink-600 hover:bg-pink-100 [&_lucide-icon]:inline-flex [&_lucide-icon]:flex-none [&_lucide-icon]:items-center [&_lucide-icon]:justify-center" type="button" (click)="club.deletePlayer(player)" aria-label="Xóa người chơi">
              <lucide-icon [img]="icons.trash2" [size]="18"></lucide-icon>
            </button>
          </div>

          @if (club.editingPlayerCode() === player.playerCode) {
            <form class="grid gap-3 border-t border-pink-200 pt-3 sm:grid-cols-2" (ngSubmit)="club.updateEditingPlayer()">
              <label class="grid gap-1.5 text-xs font-black uppercase text-pink-500 sm:col-span-2">
                <span>Tên người chơi</span>
                <input class="min-h-11 rounded-lg border border-pink-200 bg-white px-3 py-2 text-[0.95rem] font-bold normal-case text-pink-950 outline-none focus:border-pink-400 focus:ring-3 focus:ring-pink-300/40" name="editName-{{ player.playerCode }}" [(ngModel)]="club.editPlayerForm.name" />
              </label>
              <label class="grid gap-1.5 text-xs font-black uppercase text-pink-500">
                <span>Giới tính</span>
                <select class="min-h-11 rounded-lg border border-pink-200 bg-white px-3 py-2 text-[0.95rem] font-bold normal-case text-pink-950 outline-none focus:border-pink-400 focus:ring-3 focus:ring-pink-300/40" name="editGender-{{ player.playerCode }}" [(ngModel)]="club.editPlayerForm.gender">
                  <option [value]="gender.MALE">{{ genderLabels[gender.MALE] }}</option>
                  <option [value]="gender.FEMALE">{{ genderLabels[gender.FEMALE] }}</option>
                </select>
              </label>
              <label class="grid gap-1.5 text-xs font-black uppercase text-pink-500">
                <span>Trình độ</span>
                <select class="min-h-11 rounded-lg border border-pink-200 bg-white px-3 py-2 text-[0.95rem] font-bold normal-case text-pink-950 outline-none focus:border-pink-400 focus:ring-3 focus:ring-pink-300/40" name="editLevel-{{ player.playerCode }}" [(ngModel)]="club.editPlayerForm.level">
                  @for (level of levels; track level) {
                    <option [value]="level">{{ levelLabels[level] }}</option>
                  }
                </select>
              </label>
              <div class="flex flex-wrap gap-2 sm:col-span-2">
                <button class="inline-flex min-h-11 items-center gap-2 rounded-lg bg-pink-500 px-4 py-2.5 text-sm font-black text-white transition hover:bg-pink-600 disabled:cursor-not-allowed disabled:opacity-55" type="submit" [disabled]="club.loading()">Lưu thay đổi</button>
                <button class="inline-flex min-h-11 items-center gap-2 rounded-lg bg-pink-100 px-4 py-2.5 text-sm font-black text-pink-700 transition hover:bg-pink-200 disabled:cursor-not-allowed disabled:opacity-55" type="button" (click)="club.cancelEditPlayer()">Hủy</button>
              </div>
            </form>
          }
        </div>
      } @empty {
        <p class="rounded-md bg-pink-50 p-4 text-sm font-semibold text-pink-500">Chưa có người chơi.</p>
      }
    </div>
  </div>
</section>
